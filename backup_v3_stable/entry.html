<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Master Portal - 學習門戶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); z-index: -1; }
        .blob { position: absolute; width: 600px; height: 600px; background: #6366f1; filter: blur(120px); opacity: 0.15; border-radius: 50%; animation: float 20s infinite alternate; }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item { position: relative; overflow: hidden; transition: all 0.3s; }
        .nav-item:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="blob"></div>
    
    <div class="glass-card max-w-4xl w-full p-16 shadow-2xl text-center">
        <h1 class="text-6xl font-black mb-4 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-emerald-400">Vocab Master</h1>
        <p class="text-slate-400 font-bold mb-16 text-lg tracking-widest uppercase">物理隔離 · 三位一體核心</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- 英文專區 -->
            <a href="index.html" class="nav-item glass-card p-10 flex flex-col items-center">
                <div class="w-20 h-20 bg-indigo-600 rounded-3xl mb-6 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <span class="text-4xl font-black">E</span>
                </div>
                <h3 class="text-2xl font-black mb-2">英文單字</h3>
                <p class="text-slate-500 text-sm font-bold">閃卡 / 填空 / 朗讀</p>
            </a>
            
            <!-- 成語專區 -->
            <a href="idiom.html" class="nav-item glass-card p-10 flex flex-col items-center">
                <div class="w-20 h-20 bg-emerald-600 rounded-3xl mb-6 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <span class="text-4xl font-black">成</span>
                </div>
                <h3 class="text-2xl font-black mb-2">成語大師</h3>
                <p class="text-slate-500 text-sm font-bold">傳統智慧 / 釋義練習</p>
            </a>
            
            <!-- 數學專區 -->
            <a href="math.html" class="nav-item glass-card p-10 flex flex-col items-center">
                <div class="w-20 h-20 bg-sky-500 rounded-3xl mb-6 flex items-center justify-center shadow-lg shadow-sky-500/20">
                    <span class="text-4xl font-black">Σ</span>
                </div>
                <h3 class="text-2xl font-black mb-2">數學觀念</h3>
                <p class="text-slate-500 text-sm font-bold">SRS 評分 / 公式渲染</p>
            </a>
        </div>
        
        <div class="mt-20 pt-8 border-t border-white/5">
            <p class="text-slate-600 text-xs font-black uppercase tracking-widest">Ground Environment Ready · No Conflict Architecture</p>
        </div>
    </div>
</body>
</html>
